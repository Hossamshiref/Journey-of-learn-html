<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <meta name="description" content="This is my journy of learn HTML"/>
        <title>My page</title>
    </head>
    <!--
        Form_Part-6_Radio And Checkbox  
__________________________________________________________________________
    -->
    <body>
        <form method="get">
            <div>
                <label>username</label>
            <input type="text" name="username" value="Hossam" readonly />
            </div>
            <br/>
            <div>
                <label>password</label>
            <input type="password" name="password" minlength="8" maxlength="16" />
            </div>
            <br/>
            <div>
                <label>email</label>
            <input type="email" name="mail" value="hossamshiref01@gmail.com" disabled />
            </div>
            <br/>
            <div>
                <label>subject</label>
            <input type="text" name="subject" autofocus />
            </div>
            <br/>
            <div>
                <label for="num">number</label>
            <input id="num" type="number" name="number" min="10" max="100" step="10"/>   
            </div>
            <hr/>
            <div>
                <input id="lin" type="radio" name="os" value="linux" />
                <label for="lin">Linux</label>
            </div>
            <div>
                <input id ="Mac" type="radio" name="os" value="Mac" />
                <label for="Mac">Mac</label>
            </div>
                <div>
                <input id="win" type="radio" name="os" value="Windows" />
                <label for="win">Windows</label>
            </div>
            <hr/>
            <div>
                <input id="linux" type="checkbox" name="os" value="linux" />
                <label for="linux">Linux</label>
            </div>
            <div>
                <input id ="Mac1" type="checkbox" name="os" value="Mac" />
                <label for="Mac1">Mac</label>
            </div>
                <div>
                <input id="windows" type="checkbox" name="os" value="Windows" />
                <label for="windows">Windows</label>
            </div>
            <hr/>
            <input type="submit" value="Save"/>
            <input type="reset"/>
        </form>
    </body>
</html>
